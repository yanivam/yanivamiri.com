<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --dark: #12342F;
      --light: #DCEBDD;
      --detail: #D9826B;
      --muted: rgba(18, 52, 47, 0.68);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Manrope", system-ui, sans-serif;
      background: var(--light);
      color: var(--dark);
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    .card {
      max-width: 28rem;
      margin: 0 auto;
      background: #fff;
      border: 2px solid var(--dark);
      border-radius: 14px;
      padding: 1.5rem;
      box-shadow: 0 10px 28px rgba(18, 52, 47, 0.08);
    }
    h1 {
      margin: 0 0 0.35rem;
      font-size: 1.35rem;
    }
    .sub {
      margin: 0 0 1.25rem;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.45;
    }
    label {
      display: block;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.35rem;
      color: var(--muted);
    }
    input {
      width: 100%;
      padding: 0.75rem 0.85rem;
      border: 1.5px solid rgba(18, 52, 47, 0.22);
      border-radius: 10px;
      font: inherit;
      margin-bottom: 1rem;
    }
    input:focus {
      outline: none;
      border-color: var(--dark);
    }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.65rem;
      margin: 1rem 0 1.25rem;
    }
    .stat {
      background: rgba(18, 52, 47, 0.06);
      border-radius: 10px;
      padding: 0.75rem;
    }
    .stat-val {
      display: block;
      font-size: 1.5rem;
      font-weight: 800;
      line-height: 1.1;
    }
    .stat-lbl {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .actions {
      display: grid;
      gap: 0.5rem;
    }
    button {
      font: inherit;
      font-weight: 700;
      padding: 0.8rem 1rem;
      border-radius: 10px;
      cursor: pointer;
      border: 2px solid var(--dark);
      background: var(--detail);
      color: var(--dark);
    }
    button.secondary {
      background: #fff;
    }
    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .status {
      margin-top: 1rem;
      font-size: 0.82rem;
      color: var(--muted);
      min-height: 1.2rem;
    }
    .status.error { color: #9b3b2e; }
    .remember {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      margin-bottom: 1rem;
      font-size: 0.82rem;
      color: var(--muted);
    }
    .remember input {
      width: auto;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Demo admin</h1>
    <p class="sub">Download conference responses. First set <code>DEMO_ADMIN_TOKEN</code> in Railway Variables, redeploy, then paste the <strong>same</strong> value here.</p>

    <label for="token">Admin token</label>
    <input type="password" id="token" placeholder="Paste token" autocomplete="current-password">

    <label class="remember">
      <input type="checkbox" id="remember" checked>
      Remember on this device
    </label>

    <button type="button" id="btn-load">Load summary</button>

    <div class="stats" id="stats" hidden>
      <div class="stat">
        <span class="stat-val" id="stat-sessions">0</span>
        <span class="stat-lbl">Total runs</span>
      </div>
      <div class="stat">
        <span class="stat-val" id="stat-contacts">0</span>
        <span class="stat-lbl">With email</span>
      </div>
    </div>

    <div class="actions" id="downloads" hidden>
      <button type="button" id="btn-contacts">Download contacts CSV</button>
      <button type="button" class="secondary" id="btn-choices">Download all choices CSV</button>
    </div>

    <p class="status" id="status"></p>
  </div>

  <script>
    const TOKEN_KEY = "demo_admin_token";

    function tokenInput() {
      return document.getElementById("token").value.trim();
    }

    function saveToken() {
      if (document.getElementById("remember").checked) {
        sessionStorage.setItem(TOKEN_KEY, tokenInput());
      } else {
        sessionStorage.removeItem(TOKEN_KEY);
      }
    }

    function authHeaders() {
      return { Authorization: `Bearer ${tokenInput()}` };
    }

    function setStatus(msg, isError = false) {
      const el = document.getElementById("status");
      el.textContent = msg;
      el.classList.toggle("error", isError);
    }

    function adminErrorMessage(status, detail) {
      if (status === 503) {
        return "Server not configured: add DEMO_ADMIN_TOKEN in Railway → Variables, then redeploy.";
      }
      if (status === 401) {
        return "Wrong token. It must match DEMO_ADMIN_TOKEN in Railway exactly.";
      }
      return detail || `Request failed (${status})`;
    }

    async function loadSummary() {
      saveToken();
      document.getElementById("stats").hidden = true;
      document.getElementById("downloads").hidden = true;
      setStatus("Loading…");
      try {
        const res = await fetch("/api/admin/summary", { headers: authHeaders() });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(adminErrorMessage(res.status, err.detail));
        }
        const data = await res.json();
        document.getElementById("stat-sessions").textContent = data.sessions;
        document.getElementById("stat-contacts").textContent = data.contacts;
        document.getElementById("stats").hidden = false;
        document.getElementById("downloads").hidden = false;
        const latest = data.latest_session_at
          ? `Latest run: ${new Date(data.latest_session_at).toLocaleString()}`
          : "No runs yet";
        setStatus(latest);
      } catch (err) {
        setStatus(err.message, true);
      }
    }

    async function download(path, filename) {
      saveToken();
      setStatus("Downloading…");
      try {
        const res = await fetch(path, { headers: authHeaders() });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(adminErrorMessage(res.status, err.detail));
        }
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        a.click();
        URL.revokeObjectURL(url);
        setStatus(`Saved ${filename}`);
      } catch (err) {
        setStatus(err.message, true);
      }
    }

    document.getElementById("btn-load").addEventListener("click", loadSummary);
    document.getElementById("btn-contacts").addEventListener("click", () =>
      download("/api/admin/contacts.csv", "booth_contacts.csv"));
    document.getElementById("btn-choices").addEventListener("click", () =>
      download("/api/admin/choices.csv", "booth_choices.csv"));

    const saved = sessionStorage.getItem(TOKEN_KEY);
    if (saved) {
      document.getElementById("token").value = saved;
    }
  </script>
</body>
</html>
